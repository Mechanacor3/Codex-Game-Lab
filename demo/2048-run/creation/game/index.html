<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Minimal Deterministic 2048</title>
  <style>body{font-family:monospace;padding:1rem} #render{white-space:pre; font-size:14px}</style>
</head>
<body>
  <h1>2048 (minimal)</h1>
  <pre id="render">loading...</pre>

  <script type="module">
// Runtime (JS) version - mirrors the TS in src/*.ts
class RNG {
  constructor(seed=1){ this.set(seed); }
  set(seed){ this._seed = seed >>> 0; }
  // mulberry32
  next(){
    let t = this._seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

class Game {
  constructor(seed=1){
    this.size = 4;
    this.score = 0;
    this.moves = 0;
    this.state = 'playing';
    this.rng = new RNG(seed);
    this.time = 0;
    this._initBoard();
  }
  _initBoard(){
    this.board = Array.from({length:this.size},()=>Array(this.size).fill(0));
  }
  setSeed(s){ this.rng.set(s); }
  setBoard(b){ this.board = b.map(row=>row.slice()); this._updateState(); }
  getBoard(){ return this.board.map(r=>r.slice()); }
  _updateState(){
    if (this._hasTile(2048)) this.state='won';
    else if (this._checkLoss()) this.state='lost';
    else this.state='playing';
  }
  _hasTile(v){ for(let r=0;r<this.size;r++) for(let c=0;c<this.size;c++) if(this.board[r][c]===v) return true; return false; }
  _checkLoss(){
    // any zero? -> not lost
    for(let r=0;r<this.size;r++) for(let c=0;c<this.size;c++) if(this.board[r][c]===0) return false;
    // any mergeable adjacent?
    for(let r=0;r<this.size;r++){
      for(let c=0;c<this.size;c++){
        const v=this.board[r][c];
        if (r+1<this.size && this.board[r+1][c]===v) return false;
        if (c+1<this.size && this.board[r][c+1]===v) return false;
      }
    }
    return true;
  }
  _hasChanged(oldB,newB){
    for(let r=0;r<this.size;r++) for(let c=0;c<this.size;c++) if(oldB[r][c]!==newB[r][c]) return true;
    return false;
  }
  _moveLineLeft(line){
    const out = line.filter(x=>x!==0);
    const merged = [];
    let scoreGain = 0;
    for(let i=0;i<out.length-1;i++){
      if(out[i]===out[i+1] && !merged[i]){
        out[i] = out[i]*2;
        scoreGain += out[i];
        out[i+1] = 0;
        merged[i] = true; // mark this slot merged
      }
    }
    const compact = out.filter(x=>x!==0);
    while(compact.length<line.length) compact.push(0);
    return {line:compact, scoreGain};
  }
  _transpose(b){
    const s = this.size;
    const t = Array.from({length:s},()=>Array(s).fill(0));
    for(let r=0;r<s;r++) for(let c=0;c<s;c++) t[c][r]=b[r][c];
    return t;
  }
  _reverseRows(b){
    return b.map(row=>row.slice().reverse());
  }
  _spawnRandom(){
    const empties = [];
    for(let r=0;r<this.size;r++) for(let c=0;c<this.size;c++) if(this.board[r][c]===0) empties.push([r,c]);
    if(empties.length===0) return;
    const idx = Math.floor(this.rng.next()*empties.length);
    const [r,c] = empties[idx];
    const tile = this.rng.next() < 0.9 ? 2 : 4;
    this.board[r][c] = tile;
  }
  move(dir){
    return this._move(dir, true);
  }
  moveNoSpawn(dir){
    return this._move(dir, false);
  }
  _move(dir, doSpawn){
    if(this.state==='lost' || this.state==='won') return false;
    let working = this.board.map(r=>r.slice());
    let rotated=false, reversed=false;
    // Normalize to left-move by rotating/transposing
    if(dir==='up'){
      working = this._transpose(working);
      rotated=true;
    }else if(dir==='down'){
      working = this._transpose(working);
      working = this._reverseRows(working);
      rotated=true; reversed=true;
    }else if(dir==='right'){
      working = this._reverseRows(working);
      reversed=true;
    }
    let totalGain=0;
    const before = working.map(r=>r.slice());
    for(let r=0;r<this.size;r++){
      const {line, scoreGain} = this._moveLineLeft(working[r]);
      working[r]=line;
      totalGain += scoreGain;
    }
    let after = working;
    if(reversed) after = this._reverseRows(after);
    if(rotated) after = this._transpose(after);
    const changed = this._hasChanged(this.board, after);
    if(!changed) return false;
    this.board = after.map(r=>r.slice());
    this.score += totalGain;
    this.moves += 1;
    if(doSpawn) this._spawnRandom();
    this._updateState();
    return true;
  }
  renderText(){
    const rows = this.board.map(r=>r.map(v=>v===0?'.':String(v)).join(' ')).join('\n');
    const meta = `\nScore: ${this.score}  Moves: ${this.moves}  State: ${this.state}`;
    return rows + meta;
  }
}

// expose global helpers
window.__game = new Game(1);
window.setSeed = (s)=>{ window.__game.setSeed(s); };
window.setBoard = (b)=>{ window.__game.setBoard(b); window.render_game_to_text(); };
window.getBoard = ()=> window.__game.getBoard();
window.move = (dir)=> window.__game.move(dir);
window.moveNoSpawn = (dir)=> window.__game.moveNoSpawn(dir);
window.render_game_to_text = ()=>{
  const t = window.__game.renderText();
  const el = document.getElementById('render');
  if(el) el.textContent = t;
  return t;
};
window.advanceTime = (ms)=>{ window.__game.time += ms; return window.__game.time; };

// keyboard support: arrows + WASD
window.addEventListener('keydown', (ev)=>{
  const key=ev.key;
  const map = {ArrowLeft:'left',ArrowUp:'up',ArrowRight:'right',ArrowDown:'down',
               a:'left',w:'up',d:'right',s:'down',A:'left',W:'up',D:'right',S:'down'};
  if(map[key]){
    const moved = window.move(map[key]);
    if(moved) window.render_game_to_text();
  }
});

// initial render
window.render_game_to_text();
  </script>
</body>
</html>
