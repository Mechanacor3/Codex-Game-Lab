<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Minimal 2048</title>
    <style>
      :root{ --bg:#faf8ef; --tile:#cdc1b4; --accent:#776e65 }
      body { font-family: system-ui, -apple-system, sans-serif; padding:20px; background:var(--bg); color:var(--accent); }
      #app { max-width:420px; margin:0 auto; }
      .board { position:relative; width:416px; height:416px; background:#bbada0; padding:8px; box-sizing:border-box; border-radius:8px; display:grid; grid-template-columns:repeat(4,1fr); grid-gap:8px; }
      .cell { background:var(--tile); border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; color:#776e65; font-size:24px; min-height:96px; position:relative; overflow:visible; }
      .tile { position:absolute; width:100px; height:100px; display:flex; align-items:center; justify-content:center; border-radius:6px; font-weight:700; transition: transform 160ms ease, box-shadow 140ms ease; }
      .anim-clone { pointer-events:none; }
      .tile.pop { animation: pop 160ms ease; }
      @keyframes pop { 0%{ transform:scale(1) } 50%{ transform:scale(1.12) } 100%{ transform:scale(1) } }
      .overlay { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.45); color:white; font-size:20px; flex-direction:column; gap:12px; }
      .controls { margin:12px 0; display:flex; gap:8px; align-items:center; }
      .btn { padding:8px 12px; background:#eee; border-radius:6px; cursor:pointer; }
      .tog { display:inline-flex; align-items:center; gap:8px; }
      .high-contrast body, .high-contrast .tile { background:#000; color:#fff }
      .reduced-motion * { transition:none !important; animation:none !important }
    </style>
  </head>
  <body>
    <h1>Minimal Deterministic 2048</h1>
    <div id="app">
      <pre id="render" style="display:none">loading...</pre>
    </div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
